<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tori — דשבורד ניהול שיחות</title>
  <style>
    :root {
      --bg: #eef4fb;
      --panel: rgba(255, 255, 255, 0.92);
      --panel-strong: #ffffff;
      --border: rgba(37, 99, 235, 0.14);
      --text: #0f172a;
      --muted: #64748b;
      --accent: #3b82f6;
      --accent-strong: #2563eb;
      --user-bubble: linear-gradient(135deg, #2563eb, #4f46e5);
      --agent-bubble: #ffffff;
      --success: #22c55e;
      --shadow: 0 16px 38px rgba(15, 23, 42, 0.10);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(59, 130, 246, 0.20), transparent 34rem),
        radial-gradient(circle at bottom left, rgba(14, 165, 233, 0.13), transparent 28rem),
        var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .topbar {
      direction: rtl;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1rem;
      background: rgba(255, 255, 255, 0.88);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(18px);
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.04);
    }
    .topbar .brand {
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-left: 0.5rem;
      color: var(--accent-strong);
    }
    .tab-btn {
      font: inherit;
      cursor: pointer;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.45rem 1.1rem;
      background: #ffffff;
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 600;
      box-shadow: none;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #ffffff;
      border-color: transparent;
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.22);
    }
    .view {
      flex: 1;
      min-height: 0;
      display: none;
    }
    .view.active { display: flex; }
    .layout {
      display: grid;
      grid-template-columns: minmax(320px, 380px) 1fr;
      flex: 1;
      min-height: 0;
      direction: rtl;
      gap: 1px;
      background: var(--border);
      width: 100%;
    }
    .leads-view {
      direction: rtl;
      width: 100%;
      overflow: hidden;
      flex-direction: column;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.92) 0%, rgba(238, 244, 251, 0.96) 55%),
        var(--bg);
    }
    .leads-toolbar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 1.35rem;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(18px);
    }
    .leads-toolbar h2 {
      font-size: 1.05rem;
      letter-spacing: -0.02em;
    }
    .leads-count {
      font-size: 0.8rem;
      color: var(--muted);
    }
    .leads-table-wrap {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 1rem 1.35rem 1.5rem;
    }
    table.leads-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      background: var(--panel-strong);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
      font-size: 0.88rem;
    }
    table.leads-table th,
    table.leads-table td {
      padding: 0.7rem 0.9rem;
      text-align: right;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    table.leads-table thead th {
      background: rgba(37, 99, 235, 0.06);
      font-weight: 700;
      font-size: 0.8rem;
      color: var(--accent-strong);
      position: sticky;
      top: 0;
      z-index: 1;
    }
    table.leads-table tbody tr:hover { background: rgba(59, 130, 246, 0.05); }
    table.leads-table tbody tr:last-child td { border-bottom: none; }
    table.leads-table td.phone { direction: ltr; text-align: right; color: var(--muted); }
    .leads-empty {
      padding: 2rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .sidebar {
      background: var(--panel);
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      direction: rtl;
      backdrop-filter: blur(18px);
      box-shadow: -16px 0 40px rgba(15, 23, 42, 0.06);
    }
    .sidebar-header {
      padding: 1.25rem 1.25rem 1rem;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.74);
    }
    .sidebar-header h1 {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .sidebar-header .sub {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.25rem;
    }
    .conv-list {
      flex: 1;
      overflow-y: auto;
    }
    .conv-item {
      margin: 0.65rem 0.75rem;
      padding: 0.9rem 0.95rem;
      border-bottom: 1px solid var(--border);
      border: 1px solid transparent;
      border-radius: 16px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
    }
    .conv-item:hover {
      background: rgba(59, 130, 246, 0.06);
      border-color: var(--border);
      transform: translateY(-1px);
    }
    .conv-item.active {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.14), rgba(14, 165, 233, 0.10));
      border-color: rgba(37, 99, 235, 0.30);
      box-shadow: 0 10px 30px rgba(37, 99, 235, 0.14);
    }
    .conv-item .row1 {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
    }
    .conv-item .name {
      font-weight: 600;
      font-size: 0.95rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .conv-item .phone {
      font-size: 0.75rem;
      color: var(--muted);
      direction: ltr;
      text-align: right;
    }
    .conv-item .preview {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.35rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .conv-item .row1 .actions {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .conv-delete {
      background: transparent;
      border: 1px solid rgba(220, 38, 38, 0.25);
      color: #dc2626;
      padding: 0.25rem 0.55rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: none;
      transition: background 0.15s, color 0.15s;
    }
    .conv-delete:hover {
      background: #dc2626;
      color: #ffffff;
    }
    button.danger {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: #ffffff;
      box-shadow: 0 8px 18px rgba(220, 38, 38, 0.22);
    }
    button.danger:hover:not(:disabled) {
      box-shadow: 0 12px 24px rgba(220, 38, 38, 0.30);
    }
    .badge {
      font-size: 0.7rem;
      padding: 0.25rem 0.55rem;
      border-radius: 999px;
      white-space: nowrap;
      background: var(--border);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .badge.bot { background: #dbeafe; color: #1d4ed8; }
    .badge.human { background: #f3e8ff; color: #7e22ce; }
    .badge.closed { background: #dcfce7; color: #15803d; }

    .main {
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      direction: rtl;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.92) 0%, rgba(238, 244, 251, 0.96) 55%),
        var(--bg);
    }
    .main-header {
      padding: 1.1rem 1.35rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem;
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(18px);
    }
    .main-header .title {
      flex: 1;
      min-width: 200px;
    }
    .main-header .title h2 {
      font-size: 1.05rem;
    }
    .main-header .title .meta {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }
    button {
      font: inherit;
      cursor: pointer;
      border: none;
      border-radius: 12px;
      padding: 0.62rem 1rem;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #fff;
      font-size: 0.85rem;
      font-weight: 600;
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.22);
      transition: transform 0.15s, opacity 0.15s, box-shadow 0.15s;
    }
    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 14px 30px rgba(37, 99, 235, 0.30);
    }
    button.secondary {
      background: #ffffff;
      color: var(--text);
      border: 1px solid var(--border);
      box-shadow: none;
    }
    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    button.danger-outline {
      background: transparent;
      border: 1px solid #b45309;
      color: #fdba74;
    }

    .messages-wrap {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: 1.5rem 1.35rem;
      background-image:
        linear-gradient(rgba(37, 99, 235, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37, 99, 235, 0.045) 1px, transparent 1px);
      background-size: 36px 36px;
    }
    .bubble-row {
      display: flex;
      margin-bottom: 0.65rem;
    }
    .bubble-row.user { justify-content: flex-start; }
    .bubble-row.bot,
    .bubble-row.human_agent { justify-content: flex-end; }
    .bubble {
      max-width: 72%;
      padding: 0.78rem 0.95rem;
      border-radius: 18px;
      font-size: 0.9rem;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: var(--shadow);
    }
    .bubble-row.user .bubble {
      background: var(--user-bubble);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .bubble-row.bot .bubble,
    .bubble-row.human_agent .bubble {
      background: var(--agent-bubble);
      color: var(--text);
      border-bottom-left-radius: 4px;
      border: 1px solid rgba(37, 99, 235, 0.12);
    }
    .bubble-meta {
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 0.25rem;
      padding: 0 0.25rem;
    }
    .bubble-row.user .bubble-meta { text-align: left; }
    .bubble-row.bot .bubble-meta,
    .bubble-row.human_agent .bubble-meta { text-align: right; }

    .composer {
      border-top: 1px solid var(--border);
      padding: 1rem 1.35rem;
      background: rgba(255, 255, 255, 0.90);
      display: none;
      backdrop-filter: blur(18px);
    }
    .composer.visible { display: block; }
    .composer-inner {
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
    }
    textarea {
      flex: 1;
      min-height: 44px;
      max-height: 120px;
      resize: vertical;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #ffffff;
      color: var(--text);
      padding: 0.75rem 0.9rem;
      font: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    textarea:focus {
      border-color: rgba(79, 140, 255, 0.7);
      box-shadow: 0 0 0 3px rgba(79, 140, 255, 0.12);
    }
    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .err-toast {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: #7f1d1d;
      color: #fecaca;
      padding: 0.6rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      display: none;
      z-index: 100;
    }
    .err-toast.show { display: block; }
  </style>
</head>
<body>
  <div class="topbar">
    <span class="brand">Tori</span>
    <button type="button" class="tab-btn active" data-tab="conversations" id="tabConversations">שיחות</button>
    <button type="button" class="tab-btn" data-tab="leads" id="tabLeads">לידים</button>
  </div>

  <section class="view active" id="viewConversations">
    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h1>שיחות WhatsApp</h1>
          <p class="sub">שיחות כל 5 שנ׳ · הודעות בצ׳אט כל 2 שנ׳</p>
        </div>
        <div class="conv-list" id="convList"></div>
      </aside>
      <main class="main">
        <div class="main-header" id="mainHeader" style="display:none">
          <div class="title">
            <h2 id="detailName">—</h2>
            <div class="meta" id="detailPhone"></div>
          </div>
          <div class="toolbar" id="toolbar"></div>
        </div>
        <div class="empty-state" id="emptyState">בחר שיחה מהרשימה</div>
        <div class="messages-wrap" id="messagesWrap" style="display:none"></div>
        <div class="composer" id="composer">
          <div class="composer-inner">
            <textarea id="agentInput" rows="2" placeholder="הקלד הודעה כנציג…"></textarea>
            <button type="button" id="sendAgentBtn">שליחה</button>
          </div>
        </div>
      </main>
    </div>
  </section>

  <section class="view leads-view" id="viewLeads">
    <div class="leads-toolbar">
      <h2>לידים</h2>
      <span class="leads-count" id="leadsCount">—</span>
    </div>
    <div class="leads-table-wrap" id="leadsTableWrap">
      <div class="leads-empty" id="leadsLoading">טוען לידים…</div>
    </div>
  </section>

  <div class="err-toast" id="errToast"></div>

  <script>
    const API_BASE = "http://localhost:3000";
    const CONV_POLL_MS = 5000;
    const MSG_POLL_MS = 2000;
    const LEADS_POLL_MS = 5000;

    let selectedPhone = null;
    let conversationsCache = [];
    let agentSendInFlight = false;
    let lastToolbarStatus = null;
    let activeTab = "conversations";
    let leadsCache = [];

    function statusBadge(status) {
      const s = status || "bot";
      const map = {
        bot: { cls: "bot", label: "🤖 Bot" },
        human: { cls: "human", label: "👤 Human" },
        closed: { cls: "closed", label: "✅ Closed" },
      };
      const x = map[s] || map.bot;
      return `<span class="badge ${x.cls}">${x.label}</span>`;
    }

    function formatTime(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      return d.toLocaleString("he-IL", {
        day: "2-digit",
        month: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
      });
    }

    function showError(msg) {
      const el = document.getElementById("errToast");
      el.textContent = msg;
      el.classList.add("show");
      setTimeout(() => el.classList.remove("show"), 4000);
    }

    async function api(method, path, body) {
      const opts = {
        method,
        headers: { "Content-Type": "application/json" },
        cache: "no-store",
      };
      if (body != null) opts.body = JSON.stringify(body);
      const res = await fetch(API_BASE + path, opts);
      const text = await res.text();
      let data;
      try {
        data = text ? JSON.parse(text) : null;
      } catch {
        data = text;
      }
      if (!res.ok) {
        throw new Error((data && data.error) || res.statusText || "שגיאת רשת");
      }
      return data;
    }

    function renderConvList() {
      const list = document.getElementById("convList");
      list.innerHTML = conversationsCache
        .map((c) => {
          const active = c.phone === selectedPhone ? "active" : "";
          const nm = (c.name && c.name.trim()) || "ללא שם";
          const prev = (c.last_message || "").slice(0, 80);
          const phoneAttr = encodeURIComponent(c.phone);
          return `
            <div class="conv-item ${active}" data-phone="${phoneAttr}">
              <div class="row1">
                <span class="name">${escapeHtml(nm)}</span>
                <div class="actions">
                  ${statusBadge(c.status)}
                  <button type="button" class="conv-delete" data-delete="${phoneAttr}" title="מחק שיחה">מחק</button>
                </div>
              </div>
              <div class="phone">${escapeHtml(c.phone)}</div>
              <div class="preview">${escapeHtml(prev)}</div>
            </div>`;
        })
        .join("");

      list.querySelectorAll(".conv-item").forEach((el) => {
        el.addEventListener("click", (e) => {
          if (e.target.closest("[data-delete]")) return;
          const ph = decodeURIComponent(el.getAttribute("data-phone"));
          selectConversation(ph);
        });
      });

      list.querySelectorAll("[data-delete]").forEach((btn) => {
        btn.addEventListener("click", async (e) => {
          e.stopPropagation();
          const ph = decodeURIComponent(btn.getAttribute("data-delete"));
          await deleteConversationFlow(ph);
        });
      });
    }

    async function deleteConversationFlow(phone) {
      const c = conversationsCache.find((x) => x.phone === phone);
      const name = (c && c.name && c.name.trim()) || phone;
      const ok = window.confirm(
        `למחוק את השיחה עם ${name}?\nהפעולה תמחק גם את כל ההודעות ולא ניתנת לשחזור.`
      );
      if (!ok) return;
      try {
        await api("DELETE", "/api/conversations/" + encodeURIComponent(phone));
        if (selectedPhone === phone) {
          selectedPhone = null;
          lastToolbarStatus = null;
        }
        await loadConversations();
        await refreshDetail();
      } catch (e) {
        showError(e.message || String(e));
      }
    }

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    function selectConversation(phone) {
      selectedPhone = phone;
      lastToolbarStatus = null;
      renderConvList();
      refreshDetail();
    }

    async function loadConversations() {
      try {
        const rows = await api("GET", "/api/conversations");
        conversationsCache = Array.isArray(rows) ? rows : [];
        renderConvList();
        if (
          selectedPhone &&
          !conversationsCache.some((c) => c.phone === selectedPhone)
        ) {
          selectedPhone = null;
        }
        if (selectedPhone) refreshDetailHeaderOnly();
      } catch (e) {
        showError(e.message || String(e));
      }
    }

    function refreshDetailHeaderOnly() {
      const c = conversationsCache.find((x) => x.phone === selectedPhone);
      if (!c) return;
      document.getElementById("detailName").textContent =
        (c.name && c.name.trim()) || "ללא שם";
      document.getElementById("detailPhone").textContent = c.phone;
      renderToolbarIfNeeded(c.status);
    }

    function renderToolbarIfNeeded(status) {
      const st = status || "bot";
      if (lastToolbarStatus === st) return;
      lastToolbarStatus = st;
      renderToolbar(st);
    }

    function renderToolbar(status) {
      const tb = document.getElementById("toolbar");
      const composer = document.getElementById("composer");
      const st = status || "bot";

      let html = "";
      if (st === "bot") {
        html += `<button type="button" id="btnHandoff">Handoff — קח שליטה</button>`;
      }
      if (st === "human") {
        html += `<button type="button" class="secondary" id="btnHandback">החזר לבוט</button>`;
      }
      html += `<button type="button" class="danger" id="btnDelete">מחק שיחה</button>`;
      tb.innerHTML = html;

      if (st === "human") {
        composer.classList.add("visible");
      } else {
        composer.classList.remove("visible");
      }

      const h = document.getElementById("btnHandoff");
      if (h) {
        h.addEventListener("click", async () => {
          try {
            await api("POST", "/api/handoff", { phone: selectedPhone });
            await loadConversations();
            refreshDetail();
          } catch (e) {
            showError(e.message);
          }
        });
      }
      const b = document.getElementById("btnHandback");
      if (b) {
        b.addEventListener("click", async () => {
          try {
            await api("POST", "/api/handback", { phone: selectedPhone });
            await loadConversations();
            refreshDetail();
          } catch (e) {
            showError(e.message);
          }
        });
      }
      const d = document.getElementById("btnDelete");
      if (d) {
        d.addEventListener("click", async () => {
          if (!selectedPhone) return;
          await deleteConversationFlow(selectedPhone);
        });
      }
    }

    async function refreshDetail() {
      const empty = document.getElementById("emptyState");
      const wrap = document.getElementById("messagesWrap");
      const hdr = document.getElementById("mainHeader");

      if (!selectedPhone) {
        empty.style.display = "flex";
        wrap.style.display = "none";
        hdr.style.display = "none";
        document.getElementById("composer").classList.remove("visible");
        return;
      }

      empty.style.display = "none";
      wrap.style.display = "block";
      hdr.style.display = "flex";

      const c = conversationsCache.find((x) => x.phone === selectedPhone);
      document.getElementById("detailName").textContent =
        (c && c.name && c.name.trim()) || "ללא שם";
      document.getElementById("detailPhone").textContent = selectedPhone;
      renderToolbarIfNeeded(c ? c.status : "bot");

      try {
        await loadMessagesForSelection();
      } catch (e) {
        showError(e.message);
      }
    }

    async function loadMessagesForSelection() {
      if (!selectedPhone) return;
      const enc = encodeURIComponent(selectedPhone);
      const msgs = await api("GET", "/api/messages/" + enc);
      renderMessages(Array.isArray(msgs) ? msgs : []);
    }

    function renderMessages(msgs) {
      const wrap = document.getElementById("messagesWrap");
      const nearBottom =
        wrap.scrollHeight - wrap.scrollTop - wrap.clientHeight < 120;
      const prevLen = wrap.querySelectorAll(".bubble-row").length;

      wrap.innerHTML = msgs
        .map((m) => {
          const role = m.role || "user";
          const label =
            role === "user"
              ? "משתמש"
              : role === "human_agent"
              ? "נציג"
              : "בוט";
          return `
            <div class="bubble-row ${role}">
              <div>
                <div class="bubble">${escapeHtml(m.content || "")}</div>
                <div class="bubble-meta">${label} · ${formatTime(m.created_at)}</div>
              </div>
            </div>`;
        })
        .join("");

      if (nearBottom || prevLen === 0) {
        wrap.scrollTop = wrap.scrollHeight;
      }
    }

    async function sendAgentMessage() {
      if (agentSendInFlight) return;
      const ta = document.getElementById("agentInput");
      const btn = document.getElementById("sendAgentBtn");
      const text = (ta.value || "").trim();
      if (!selectedPhone || !text) return;

      agentSendInFlight = true;
      btn.disabled = true;
      btn.textContent = "שולח…";

      try {
        await api("POST", "/api/send-as-agent", {
          phone: selectedPhone,
          message: text,
        });
        ta.value = "";
        await loadConversations();
        await refreshDetail();
      } catch (e) {
        showError(e.message);
      } finally {
        agentSendInFlight = false;
        btn.disabled = false;
        btn.textContent = "שליחה";
      }
    }

    document.getElementById("sendAgentBtn").addEventListener("click", sendAgentMessage);

    // ===== TABS =====
    function switchTab(tab) {
      activeTab = tab;
      document.querySelectorAll(".tab-btn").forEach((b) => {
        b.classList.toggle("active", b.dataset.tab === tab);
      });
      document
        .getElementById("viewConversations")
        .classList.toggle("active", tab === "conversations");
      document
        .getElementById("viewLeads")
        .classList.toggle("active", tab === "leads");
      if (tab === "leads") loadLeads();
    }

    document
      .getElementById("tabConversations")
      .addEventListener("click", () => switchTab("conversations"));
    document
      .getElementById("tabLeads")
      .addEventListener("click", () => switchTab("leads"));

    // ===== LEADS =====
    async function loadLeads() {
      try {
        const rows = await api("GET", "/api/leads");
        leadsCache = Array.isArray(rows) ? rows : [];
        renderLeads();
      } catch (e) {
        showError(e.message || String(e));
      }
    }

    function renderLeads() {
      const wrap = document.getElementById("leadsTableWrap");
      const countEl = document.getElementById("leadsCount");
      countEl.textContent = `${leadsCache.length} לידים`;

      if (!leadsCache.length) {
        wrap.innerHTML = `<div class="leads-empty">אין לידים עדיין. כל ליד חדש שיכנס לטבלה ב-Supabase יקפוץ כאן ויקבל הודעת וואטסאפ אוטומטית.</div>`;
        return;
      }

      const rows = leadsCache
        .map((l) => {
          return `
            <tr>
              <td>${escapeHtml(l.name || "")}</td>
              <td>${escapeHtml(l.business || "")}</td>
              <td>${escapeHtml(l.business_type || "")}</td>
              <td class="phone">${escapeHtml(l.phone || "")}</td>
              <td>${escapeHtml(l.source || "")}</td>
              <td>${escapeHtml(l.notes || "")}</td>
              <td>${formatTime(l.created_at)}</td>
            </tr>`;
        })
        .join("");

      wrap.innerHTML = `
        <table class="leads-table">
          <thead>
            <tr>
              <th>שם</th>
              <th>שם העסק</th>
              <th>תחום</th>
              <th>טלפון</th>
              <th>מקור</th>
              <th>הערות</th>
              <th>נכנס בתאריך</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    loadConversations();
    setInterval(loadConversations, CONV_POLL_MS);

    setInterval(async () => {
      if (!selectedPhone) return;
      try {
        await loadMessagesForSelection();
        const c = conversationsCache.find((x) => x.phone === selectedPhone);
        if (c) renderToolbarIfNeeded(c.status);
      } catch (e) {
        showError(e.message || String(e));
      }
    }, MSG_POLL_MS);

    setInterval(() => {
      if (activeTab === "leads") loadLeads();
    }, LEADS_POLL_MS);

    document.getElementById("agentInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendAgentMessage();
      }
    });
  </script>
</body>
</html>
